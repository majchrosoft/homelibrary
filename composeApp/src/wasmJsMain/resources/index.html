<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Home Library</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:," />
    <style>
        html, body { margin: 0; padding: 0; height: 100%; background: #fffbfe; font-family: system-ui, sans-serif; }
        #loading { display: flex; align-items: center; justify-content: center; height: 100vh; color: #625b71; }
    </style>
</head>
<body>
    <div id="loading">Loading Home Library…</div>
    <!--
      Firebase JS SDK is loaded by the GitLive Firebase wrapper at runtime via dynamic
      imports. Configuration values are injected by the build pipeline into firebase-config.js
      from the FIREBASE_WEB_CONFIG GitHub secret. firebase-config.js is gitignored.
    -->
    <script type="application/javascript" src="firebase-config.js"></script>
    <script type="application/javascript">
        // Placeholder objects for KMP Wasm interop to prevent crashes during early init
        window.firebaseApp = null;
        window.firebaseAuth = null;
        window.firebaseAuthUtils = null;
    </script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendPasswordResetEmail, signOut, updateProfile, getIdToken } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-auth.js";
        import { getDatabase, ref, onValue, push, set, update, remove, query, orderByChild, limitToFirst } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-database.js";

        try {
            const app = initializeApp(window.__FIREBASE_CONFIG__);
            const auth = getAuth(app);
            const db = getDatabase(app);

            // Expose to window for KMP Wasm interop
            window.firebaseApp = app;
            window.firebaseAuth = auth;
            window.firebaseDb = db;
            window.firebaseAuthUtils = {
                onAuthStateChanged,
                signInWithEmailAndPassword,
                createUserWithEmailAndPassword,
                sendPasswordResetEmail,
                signOut,
                updateProfile,
                getIdToken
            };
            window.firebaseDbUtils = {
                ref,
                onValue,
                push,
                set,
                update,
                remove,
                query,
                orderByChild,
                limitToFirst
            };
            console.log("Firebase initialized successfully");
        } catch (e) {
            console.error("Failed to initialize Firebase:", e);
        }
    </script>
    <script type="application/javascript" src="composeApp.js"></script>
</body>
</html>
