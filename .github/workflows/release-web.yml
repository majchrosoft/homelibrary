name: Release · Web

on:
  push:
    tags: ['v*.*.*']
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Build & deploy to Firebase Hosting
    runs-on: ubuntu-latest
    environment: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Inject Firebase Web config
        run: |
          cat > composeApp/src/wasmJsMain/resources/firebase-config.js <<'EOF'
          ${{ secrets.FIREBASE_WEB_CONFIG_JS }}
          EOF

      - name: Build Wasm distribution
        run: ./gradlew :composeApp:wasmJsBrowserDistribution --stacktrace

      - name: Deploy to Firebase Hosting (channel preview on PR/main, live on tag)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          projectId: homelibrary-prod
          channelId: ${{ startsWith(github.ref, 'refs/tags/') && 'live' || 'preview' }}
          entryPoint: .
