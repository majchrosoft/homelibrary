name: iosApp
options:
  bundleIdPrefix: com.majchrosoft.homelibrary
  deploymentTarget:
    iOS: "15.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: "$(DEVELOPMENT_TEAM)"
    SWIFT_VERSION: "5.9"

targets:
  iosApp:
    type: application
    platform: iOS
    sources:
      - path: iosApp
    info:
      path: iosApp/Info.plist
      properties:
        CFBundleDisplayName: Home Library
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.majchrosoft.homelibrary
        ENABLE_USER_SCRIPT_SANDBOXING: NO
    dependencies:
      - framework: ../shared/build/XCFrameworks/release/Shared.xcframework
        embed: true
    preBuildScripts:
      - name: "Build Shared XCFramework"
        script: |
          cd "$SRCROOT/.."
          ./gradlew :shared:assembleSharedReleaseXCFramework
        basedOnDependencyAnalysis: false
