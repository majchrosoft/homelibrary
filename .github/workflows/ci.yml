name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ktlint + detekt)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}
      - run: ./gradlew ktlintCheck detekt --stacktrace
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: lint-reports
          path: |
            **/build/reports/ktlint/
            **/build/reports/detekt/

  test-shared:
    name: Test shared (common + JVM)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew :shared:jvmTest :shared:testDebugUnitTest --stacktrace
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: shared-test-results
          path: '**/build/test-results/'

  build-android:
    name: Build Android (debug)
    runs-on: ubuntu-latest
    needs: [lint, test-shared]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
      - name: Inject placeholder google-services.json
        run: cp .github/scripts/google-services.placeholder.json composeApp/google-services.json
      - run: ./gradlew :composeApp:assembleDebug --stacktrace
      - uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: composeApp/build/outputs/apk/debug/*.apk

  build-web:
    name: Build Web (Wasm)
    runs-on: ubuntu-latest
    needs: [lint, test-shared]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew :composeApp:wasmJsBrowserDistribution --stacktrace
      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: composeApp/build/dist/wasmJs/productionExecutable/

  build-ios:
    name: Build iOS shared XCFramework
    runs-on: macos-14
    needs: [lint, test-shared]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew :shared:assembleSharedReleaseXCFramework --stacktrace
      - uses: actions/upload-artifact@v4
        with:
          name: shared-xcframework
          path: shared/build/XCFrameworks/release/Shared.xcframework
